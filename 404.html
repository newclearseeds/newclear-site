<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-src 'none'; img-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'unsafe-inline'; form-action 'none'">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Page Not Found | Newclear Computing</title>
    <script>
        (function () {
            var host = location.hostname;
            var path = location.pathname;
            var target = "https://www.newclear.com.au";

            if (path === "/www." || path === "/www" || path.indexOf("/www.") === 0) {
                location.replace(target + "/");
                return;
            }

            if (host === "newclear.co" || host === "www.newclear.co") {
                location.replace(target + (path === "/" ? "/" : path) + location.search + location.hash);
                return;
            }
        })();
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark: #05070d;
            --blue: #1870d0;
            --blue-light: #1aa7e8;
            --green: #3aa50b;
            --text: #e6eef7;
            --muted: #a7b4c5;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at 20% 10%, rgba(26, 167, 232, 0.18), transparent 36%),
                radial-gradient(circle at 85% 85%, rgba(58, 165, 11, 0.16), transparent 32%),
                var(--dark);
        }

        .not-found-card {
            width: min(100%, 680px);
            padding: clamp(2rem, 6vw, 3.5rem);
            border: 1px solid rgba(127, 214, 255, 0.18);
            border-radius: 20px;
            background: linear-gradient(145deg, rgba(17, 26, 45, 0.97), rgba(7, 12, 23, 0.97));
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: min(100%, 320px);
            height: auto;
            margin: 0 auto 1.5rem;
        }

        h1 {
            margin-bottom: 0.6rem;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            color: var(--blue-light);
        }

        p {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .home-link {
            display: inline-block;
            margin-top: 1.75rem;
            padding: 0.9rem 1.5rem;
            border-radius: 10px;
            color: white;
            background: linear-gradient(135deg, var(--green), var(--blue));
            font-weight: 700;
            text-decoration: none;
        }

        .home-link:hover {
            background: linear-gradient(135deg, #4cbd18, var(--blue-light));
        }
    </style>
</head>
<body>
    <main class="not-found-card">
        <img class="logo" src="assets/newclear-computing-logo-clean.png" alt="Newclear Computing">
        <h1>Page not found</h1>
        <p>The page you requested is not available. You can return to our main site to explore our cybersecurity and IT services.</p>
        <a class="home-link" href="https://www.newclear.com.au/">Go to Newclear Computing</a>
    </main>
</body>
</html>
