<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-src 'none'; img-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'none'; form-action 'none'">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Thank You | Newclear Computing</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark: #05070d;
            --panel: #0b1222;
            --blue: #1870d0;
            --blue-light: #1aa7e8;
            --green: #3aa50b;
            --text: #e6eef7;
            --muted: #a7b4c5;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at 20% 10%, rgba(26, 167, 232, 0.18), transparent 36%),
                radial-gradient(circle at 85% 85%, rgba(58, 165, 11, 0.16), transparent 32%),
                var(--dark);
        }

        .thank-you-card {
            width: min(100%, 680px);
            padding: clamp(2rem, 6vw, 4rem);
            border: 1px solid rgba(127, 214, 255, 0.18);
            border-radius: 20px;
            background: linear-gradient(145deg, rgba(17, 26, 45, 0.97), rgba(7, 12, 23, 0.97));
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 40px rgba(24, 112, 208, 0.12);
            text-align: center;
        }

        .logo {
            width: min(100%, 360px);
            height: auto;
            margin: 0 auto 2rem;
        }

        .check {
            display: grid;
            place-items: center;
            width: 78px;
            height: 78px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            color: white;
            background: linear-gradient(135deg, var(--green), var(--blue));
            box-shadow: 0 0 30px rgba(58, 165, 11, 0.3);
            font-size: 2.5rem;
            font-weight: 800;
        }

        h1 { margin-bottom: 0.8rem; font-size: clamp(2rem, 6vw, 3.2rem); }
        p { color: var(--muted); font-size: 1.1rem; line-height: 1.7; }

        .home-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.9rem 1.5rem;
            border-radius: 10px;
            color: white;
            background: linear-gradient(135deg, var(--green), var(--blue));
            box-shadow: 0 10px 24px rgba(24, 112, 208, 0.28);
            font-weight: 700;
            text-decoration: none;
        }

        .home-link:hover { background: linear-gradient(135deg, #4cbd18, var(--blue-light)); }
        .home-link:focus-visible { outline: 3px solid #7fd6ff; outline-offset: 3px; }
    </style>
</head>
<body>
    <main class="thank-you-card">
        <img class="logo" src="assets/newclear-computing-logo-clean.png" alt="Newclear Computing">
        <div class="check" aria-hidden="true">✓</div>
        <h1>Thank you</h1>
        <p>Your security review request has been received. We’ll review your enquiry and get back to you shortly.</p>
        <a class="home-link" href="index.html">Return to Newclear Computing</a>
    </main>
</body>
</html>
